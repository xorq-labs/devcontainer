# Compose override for the Nix hybrid base (devcontainer-nix-base, from
# flake.nix) via Dockerfile.nix-default. dev/devcontainer appends this file
# automatically when routing selects the Nix base — the DEFAULT for overlays
# that neither mount a nix seed volume nor override classic-only Dockerfile
# build args. DEV_NIX_BASE=0 forces the classic root Dockerfile instead;
# DEV_NIX_BASE=1 forces this base.
#
# ensure_nix_base() makes the base image present before a build: already
# local -> done, else `docker pull` of the pinned ref below. Building locally
# stays the documented fallback for hosts that can't reach the registry:
#
#   (cd nix/base && nix build .#defaultBase && ./result | docker load)
#   DEV_NIX_BASE_IMAGE=devcontainer-nix-base:latest DEV_NIX_BASE=1 dev/devcontainer up
#
# The build context (repo root) and the `project` additional context are
# inherited from docker-compose.yml — Dockerfile.nix-default consumes both
# (COPY lib/*, setup-claude.py, COPY --from=project ...), matching the manual
# `docker build --build-context project=...` invocation in the README.
#
# INCOMPATIBLE with an overlay that mounts a nix seed volume (`:/nix`): that
# mount shadows the Nix base's baked /nix/store and orphans the infra PATH
# (config.Env points at ${infraEnv}/bin under /nix/store). dev/devcontainer
# refuses the combination — run this against a non-seed overlay (e.g. defaults).
services:
  app:
    build:
      # relative to the build context (repo root, ${DEV_BASE_DIR})
      dockerfile: nix/base/Dockerfile.nix-default
      args:
        # The CI-published multi-arch Nix base (.github/workflows/nix-base.yml),
        # pinned by MANIFEST-LIST digest so an upstream retag never changes
        # what anyone builds on. Bump deliberately after a publish — the digest
        # is printed in the workflow's job summary (or:
        #   docker buildx imagetools inspect ghcr.io/xorq-labs/devcontainer-nix-base:<tag>).
        # DEV_NIX_BASE_IMAGE overrides for a locally-built base (see header);
        # ensure_nix_base() greps the pinned default out of this line.
        BASE_IMAGE: >-
          ${DEV_NIX_BASE_IMAGE:-ghcr.io/xorq-labs/devcontainer-nix-base@sha256:287003b1fe70641b8426e66912633d1310c1cb389583f109a876a07875e35f2c}
