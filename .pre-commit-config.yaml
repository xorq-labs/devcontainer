repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        types: [shell]
        exclude: ^\.envrc$
      # keep in sync with .github/workflows/lint.yml extensionless step
      - id: shellcheck
        name: shellcheck (extensionless)
        args: [--severity=warning]
        types: [file]
        files: ^dev/(devcontainer|devcontainer-completions|init|new-worktree|setup-worktree|cleanup-worktree|hooks/post-checkout)$

  # keep ruff/yamllint/hadolint pins in sync with projects/devcontainer/install-system.sh
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]

  - repo: https://github.com/AleksaC/hadolint-py
    rev: v2.14.0
    hooks:
      - id: hadolint
        args: [--config, .hadolint.yaml]
