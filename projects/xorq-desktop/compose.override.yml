services:
  app:
    build:
      args:
        # Prepended to PATH inside the container (project venv + cargo + nix profile)
        EXTRA_PATH: "${DEV_CONTAINER_WORKSPACE:?DEV_CONTAINER_WORKSPACE is required}/.venv/bin:/home/vscode/.cargo/bin:/home/vscode/.nix-profile/bin"
    volumes:
      # cached build/dependency volumes
      - uv-cache:/home/vscode/.cache/uv
      - venv:${DEV_CONTAINER_WORKSPACE:?DEV_CONTAINER_WORKSPACE is required}/.venv
      - pnpm-store:/home/vscode/.local/share/pnpm/store
      - cargo-registry:/home/vscode/.cargo/registry
      - cargo-git:/home/vscode/.cargo/git
      - node-modules:${DEV_CONTAINER_WORKSPACE:?DEV_CONTAINER_WORKSPACE is required}/desktop/node_modules
      # cargo-target and node-modules are per-worktree (concurrent writes to
      # the same target/node_modules dir from sibling containers corrupt
      # incremental build state); nix is shared across worktrees because the
      # store is content-addressed and cli-locked.
      - cargo-target:${DEV_CONTAINER_WORKSPACE:?DEV_CONTAINER_WORKSPACE is required}/desktop/src-tauri/target
      - nix:/nix
      # Nix: host config (nix.conf, registry.json) read-only
      - ${HOME}/.config/nix:/home/vscode/.config/nix-host:ro
    hostname: ${DEV_HOSTNAME:-devcontainer}
    environment:
      - NIX_CONFIG=sandbox = false
      - DISPLAY=${DISPLAY:-}
      - LIBGL_ALWAYS_SOFTWARE=1

volumes:
  # external:true (shared across worktrees, content-addressed) suppresses the
  # cross-worktree ownership warning; dev/devcontainer pre-creates them via
  # ensure_external_volumes() reading external-volumes.txt.
  uv-cache:
    name: ${DEV_PROJECT_NAME:?DEV_PROJECT_NAME is required}-uv-cache
    external: true
  pnpm-store:
    name: ${DEV_PROJECT_NAME:?DEV_PROJECT_NAME is required}-pnpm-store
    external: true
  cargo-registry:
    name: ${DEV_PROJECT_NAME:?DEV_PROJECT_NAME is required}-cargo-registry
    external: true
  cargo-git:
    name: ${DEV_PROJECT_NAME:?DEV_PROJECT_NAME is required}-cargo-git
    external: true
  nix:
    name: ${DEV_PROJECT_NAME:?DEV_PROJECT_NAME is required}-nix
    external: true
  # per-worktree: virtualenv paths and build targets are workspace-specific
  venv:
  node-modules:
  cargo-target:
